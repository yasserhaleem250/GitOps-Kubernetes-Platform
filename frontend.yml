name: Build and Push Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          version: 'latest'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIP }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Configure Docker to use gcloud
        run: gcloud auth configure-docker gcr.io

      - name: Build Docker image
        working-directory: ./frontend
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:${{ github.sha }} \
                       -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:latest \
                       .

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:latest

      - name: Update image in manifest
        if: github.ref == 'refs/heads/main'
        run: |
          sed -i "s|gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:latest|gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:${{ github.sha }}|g" kubernetes/frontend-deployment.yaml

      - name: Commit and push updated manifest
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add kubernetes/frontend-deployment.yaml
          git commit -m "Update frontend image to ${{ github.sha }}" || echo "No changes to commit"
          git push
