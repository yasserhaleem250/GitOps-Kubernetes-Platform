apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # RBAC Configuration
  policy.default: 'role:readonly'
  policy.csv: |
    p, role:admin, *, *, allow
    p, role:readonly, applications, get, allow
    p, role:readonly, repositories, get, allow
    g, your-github-user, role:admin

  # Repository Settings
  repositories: |
    - type: git
      url: https://github.com/your-username/gitops-k8s-gcp
      passwordSecret:
        name: github-repo-creds
        key: password
      usernameSecret:
        name: github-repo-creds
        key: username

  # URL Configuration
  url: https://argocd.example.com
